name: Build & Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install frontend dependencies
        run: cd internal/web/frontend && npm ci

      - name: Run frontend tests
        run: cd internal/web/frontend && npx vitest run

      - name: Run tests
        run: go test ./... -v -count=1

  build-and-deploy:
    name: Build & Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build frontend
        run: |
          cd internal/web/frontend && npm ci
          npx esbuild src/main.ts --bundle --minify --target=es2020 --outfile=../static/terminal.min.js
          npx esbuild ../static/style.css --minify --outfile=../static/style.min.css
          npx html-minifier-terser --collapse-whitespace --remove-comments --remove-redundant-attributes --minify-js '{"mangle":false}' --minify-urls -o ../static/index.html ../static/index.dev.html

      - name: Build for Linux amd64
        run: GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o tewodros-terminal ./cmd/server

      - name: Deploy to server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 2222 "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          scp -P 2222 -i ~/.ssh/deploy_key \
            tewodros-terminal \
            "${SERVER_USER}@${SERVER_HOST}:/opt/tewodros-terminal/tewodros-terminal-new"

          scp -P 2222 -i ~/.ssh/deploy_key \
            deploy/tewodros-terminal.service \
            "${SERVER_USER}@${SERVER_HOST}:/tmp/tewodros-terminal.service"

          ssh -p 2222 -i ~/.ssh/deploy_key "${SERVER_USER}@${SERVER_HOST}" << 'EOF'
            cd /opt/tewodros-terminal
            mv tewodros-terminal-new tewodros-terminal
            chmod +x tewodros-terminal
            sudo mv /tmp/tewodros-terminal.service /etc/systemd/system/tewodros-terminal.service
            sudo systemctl daemon-reload
            sudo systemctl restart tewodros-terminal
          EOF
